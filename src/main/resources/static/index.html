<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Sistema Financeiro</h1>

<h2>Nova Transação</h2>
<input type="text" id="description" placeholder="Descrição">
<input type="number" id="amount" placeholder="Valor">
<select id="type">
    <option value="INCOME">Entrada</option>
    <option value="EXPENSE">Saída</option>
</select>
<input type="date" id="date">
<button onclick="addTransaction()">Adicionar</button>

<h2>Transações</h2>
<ul id="list"></ul>

<script>
    async function loadTransactions() {
        const res = await fetch('http://localhost:8080/transactions');
        const data = await res.json();

        const list = document.getElementById('list');
        list.innerHTML = '';

        data.forEach(t => {
            const li = document.createElement('li');
            li.innerHTML = `
            ${t.description} - R$ ${t.amount} - ${t.type}
            <button onclick="deleteTransaction(${t.id})">Excluir</button>
        `;
            list.appendChild(li);
        });
    }

    async function addTransaction() {
        const description = document.getElementById('description').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const date = document.getElementById('date').value;

        await fetch('http://localhost:8080/transactions', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ description, amount, type, date })
        });

        loadTransactions();
    }

    async function deleteTransaction(id) {
        await fetch(`http://localhost:8080/transactions/${id}`, {
            method: 'DELETE'
        });

        loadTransactions();
    }

    loadTransactions();
</script>

</body>
</html>
