<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Sistema Financeiro</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Sistema Financeiro</h1>

<h2>Nova Transação</h2>

<input type="text" id="description" placeholder="Descrição">

<input type="number" id="amount" placeholder="Valor">

<select id="type">
    <option value="INCOME">Entrada</option>
    <option value="EXPENSE">Saída</option>
</select>

<select id="category">
    <option value="FOOD">Alimentação</option>
    <option value="TRANSPORT">Transporte</option>
    <option value="ENTERTAINMENT">Lazer</option>
    <option value="SALARY">Salário</option>
    <option value="OTHER">Outros</option>
</select>

<input type="date" id="date">

<button onclick="addTransaction()">Adicionar</button>

<h2>Transações</h2>
<ul id="list"></ul>

<div class="chart-container">
    <canvas id="myChart" width="300" height="300"></canvas>
</div>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<script>

    async function loadTransactions() {
        const res = await fetch('http://localhost:8080/transactions');
        const data = await res.json();

        const list = document.getElementById('list');
        list.innerHTML = '';

        data.forEach(t => {
            const li = document.createElement('li');

            li.innerHTML = `
                ${t.description} -
                R$ ${t.amount} -
                ${t.type} -
                ${t.category}

                <button onclick="deleteTransaction(${t.id})">
                    Excluir
                </button>
            `;

            list.appendChild(li);
        });
        createChart(data);
    }

    let chart;

    function createChart(data) {

        let income = 0;
        let expense = 0;

        data.forEach(t => {

            if (t.type === "INCOME") {
                income += Number(t.amount);
            } else {
                expense += Number(t.amount);
            }

        });

        const ctx = document.getElementById('myChart');

        if (chart) {
            chart.destroy();
        }

        chart = new Chart(ctx, {
            type: 'pie',
            data: {
                labels: ['Entradas', 'Saídas'],
                datasets: [{
                    data: [income, expense]
                }]
            },
            options: {
                responsive: false
            }
        });
    }

    async function addTransaction() {

        const description = document.getElementById('description').value;
        const amount = document.getElementById('amount').value;
        const type = document.getElementById('type').value;
        const category = document.getElementById('category').value;
        const date = document.getElementById('date').value;

        await fetch('http://localhost:8080/transactions', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({
                description,
                amount,
                type,
                category,
                date
            })
        });

        loadTransactions();

    }

    async function deleteTransaction(id) {

        await fetch(`http://localhost:8080/transactions/${id}`, {
            method: 'DELETE'
        });

        loadTransactions();
    }

    loadTransactions();
</script>

</body>
</html>
